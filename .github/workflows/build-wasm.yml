name: build-wasm
run-name: ${{ github.actor }} is building wasm file

on:
  push:
    paths-ignore:
      - '**/README.md'

jobs:
  build-wasm-file:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up environment variables from "scripts/.env" file
        run: |
          if [ -f "scripts/.env" ]; then
              export $(grep -v '^#' "scripts/.env" | xargs)
          else
              echo "## scripts/.env file not found!"
              exit 1
          fi
          echo "EMSCRIPTEN=$EMSCRIPTEN" >> $GITHUB_ENV
          echo "QT_VERSION=$QT_VERSION" >> $GITHUB_ENV
          echo "OUTPUTDIR=$OUTPUTDIR" >> $GITHUB_ENV

      - name: Show fetched environment variables
        run: |
          echo "Loaded environment variables from \"scripts/.env\" file:"
          echo "EMSCRIPTEN: ${{ env.EMSCRIPTEN }}"
          echo "QT_VERSION: ${{ env.QT_VERSION }}"
          echo "OUTPUTDIR: ${{ env.OUTPUTDIR }}"

      - name: Check for a cached version
        uses: actions/cache@v5
        id: cached-versions
        with:
          path: |
            # Cache the Qt and emscripten installation
            ${{ env.OUTPUTDIR }}
          # Adding version as cache key
          key: ${{ runner.os }}__qt-${{ env.QT_VERSION }}__em-${{ env.EMSCRIPTEN }}__libegl1

      - name: Install requirements (cache miss)
        if: steps.cached-versions.outputs.cache-hit != 'true'
        run: |
          bash scripts/build-wasm-install-requirements.sh

      - name: Install libraries needed for building the wasm (cache hit)
        if: steps.cached-versions.outputs.cache-hit == 'true'
        run: |
          sudo apt-get update -yq
          sudo apt-get install -y libegl1

      - name: Build WebAssembly
        run: |
          bash scripts/build-wasm.sh

      - name: Upload ZIP file
        uses: actions/upload-artifact@v7
        with:
          name: venus-webassembly
          path: build-wasm_files_to_copy
          retention-days: 5

      - name: Prepare GitHub Pages deployment
        if: github.ref == 'refs/heads/dbus-serialbattery/main'
        run: |
          mkdir -p gh-pages
          cp -r build-wasm_files_to_copy/wasm/. gh-pages/
          mv gh-pages/venus-gui-v2.wasm.gz gh-pages/venus-gui-v2.wasm
          python3 - <<'PYEOF'
          import sys
          with open('gh-pages/index.html') as f:
              content = f.read()
          # Use the comment that immediately follows the init() searchParams declaration
          # to uniquely identify it (there is a second searchParams in preloadWasm).
          needle = (
              'const searchParams = new URLSearchParams(window.location.search);\n'
              '\n'
              '            // If mqtt param is set'
          )
          if needle not in content:
              print('ERROR: patch target not found in index.html', file=sys.stderr)
              sys.exit(1)
          replacement = (
              'const searchParams = new URLSearchParams(window.location.search);\n'
              '            searchParams.set("mockdata", "dbus-serialbattery");\n'
              '\n'
              '            // If mqtt param is set'
          )
          content = content.replace(needle, replacement, 1)
          # Patch 2: decompress gzip WASM in the browser (served without Content-Encoding header on GitHub Pages)
          needle2 = 'const reader = response.body.getReader();'
          replacement2 = "const reader = response.body.pipeThrough(new DecompressionStream('gzip')).getReader();"
          if needle2 not in content:
              print('ERROR: DecompressionStream patch target not found in index.html', file=sys.stderr)
              sys.exit(1)
          content = content.replace(needle2, replacement2, 1)
          # Patch 3: inject Matomo analytics before </body>
          matomo = (
              '    <script>\n'
              '        var _paq = window._paq = window._paq || [];\n'
              '        _paq.push(["disableCookies"]);\n'
              '        _paq.push(["trackPageView"]);\n'
              '        _paq.push(["enableLinkTracking"]);\n'
              '        (function() {\n'
              '            var u="//github.md0.eu/matomo/";\n'
              '            _paq.push(["setTrackerUrl", u+"matomo.php"]);\n'
              '            _paq.push(["setSiteId", "2"]);\n'
              '            var d=document, g=d.createElement("script"), s=d.getElementsByTagName("script")[0];\n'
              '            g.async=true; g.src=u+"matomo.js"; s.parentNode.insertBefore(g,s);\n'
              '        })();\n'
              '    </script>\n'
              '</body>'
          )
          if '</body>' not in content:
              print('ERROR: </body> not found in index.html', file=sys.stderr)
              sys.exit(1)
          content = content.replace('</body>', matomo, 1)
          with open('gh-pages/index.html', 'w') as f:
              f.write(content)
          print('index.html patched: mockdata set, DecompressionStream injected, Matomo added')
          PYEOF

      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/dbus-serialbattery/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./gh-pages

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/dbus-serialbattery/main'
        uses: actions/deploy-pages@v4

      - name: Release - ZIP wasm files
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd build-wasm_files_to_copy
          zip -r ../venus-webassembly.zip wasm

      - name: Release - Create release with wasm files
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: venus-webassembly.zip
